- title: Location, housing and employment opportunities
  authors: Chiodi, Vera & Crépon, Bruno & Cruces, Guillermo
  venue: Labour Economics
  year: '2026'
  url: https://ideas.repec.org/a/eee/labeco/v99y2026ics0927537125001514.html
  description: Elsevier, vol. 99(C).
  linkLabel: Open paper
  abstract: 'Housing conditions, residential location, and employment are key determinants of individual welfare, particularly for vulnerable populations facing credit constraints and information frictions. We examine how housing assistance affects employment outcomes using a randomized controlled trial in France that provided vulnerable youth (aged 18–25) with both job search assistance and housing support, including rent guarantees. The program successfully improved housing conditions: beneficiaries experienced better accommodation stability, reduced precarious situations, and increased satisfaction with their housing. However, despite substantial social worker support, the program did not improve employment rates, contract types, or earnings. Strikingly, beneficiaries moved to neighborhoods with objectively worse employment opportunities and lower socioeconomic indicators, yet reported higher satisfaction with their residential areas. This apparent paradox reveals that beneficiaries appear
    to prioritize housing affordability and conditions over employment access. Our results suggest that successful interventions may need to explicitly balance housing improvements with maintaining access to employment opportunities.'
  citationApa: Chiodi, V., Crépon, B., & Cruces, G. (2026). Location, housing and employment opportunities. Labour Economics, 99. https://doi.org/10.1016/j.labeco.2025.102827
