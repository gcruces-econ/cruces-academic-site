- title: How vocational education made women better off but left men behind
  authors: Acevedo, Paloma & Cruces, Guillermo & Gertler, Paul & Martinez, Sebastian
  venue: Labour Economics
  year: '2020'
  url: https://ideas.repec.org/a/eee/labeco/v65y2020ics0927537120300294.html
  description: Elsevier, vol. 65(C).
  linkLabel: Open paper
  abstract: 'This paper examines the interaction between vocational and soft skills training on labor market outcomes and expectations of youth in the Dominican Republic. Applicants to a training program were randomly assigned to one of three modalities: a full treatment consisting of vocational and soft skills training plus an internship, a partial treatment consisting of soft skills training plus an internship, or a control group with no training or internship. We find strong and lasting effects of the program on personal skills acquisition and expectations, but results are markedly different for men and women. Shortly after completing the program, all participants reported increased expectations for improved employment and livelihoods. This result is reversed for male participants after three and a half years, potentially explained by the program''s negative short-run labor market effects for that group. On the other hand, female participants experience improved labor market outcomes
    in the short run and exhibit substantially higher levels of personal skills after three and a half years; the women in the study became more optimistic and reported higher self-esteem. Men experienced no such benefits. Our results suggest that job-training programs of this type can be transformative – for women, life skills mattered and made a difference. But they can also have a downside if, as was the case for men in this study, training creates expectations that are not met. Although, overall, impacts are similar for the full treatment and the partial treatment, the positive impacts on soft skills for women, and the adverse impacts on labor outcomes and expectations for men are stronger for the full treatment.'
  citationApa: Acevedo, P., Cruces, G., Gertler, P., & Martinez, S. (2020). How vocational education made women better off but left men behind. Labour Economics, 65. https://doi.org/10.1016/j.labeco.2020.101824
