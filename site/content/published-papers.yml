- title: 'Estimating poverty transitions using repeated cross-sections: a three-country validation exercise'
  authors: Guillermo Cruces & Peter Lanjouw & Leonardo Lucchetti & Elizaveta Perova & Renos Vakis & Mariana Viollaz
  venue: The Journal of Economic Inequality
  year: '2015'
  url: https://ideas.repec.org/a/kap/jecinq/v13y2015i2p161-179.html
  description: Springer;Society for the Study of Economic Inequality, vol. 13(2), pages 161-179, June.
  linkLabel: Open paper
  abstract: This paper validates a recently proposed method to estimate intra-generational poverty transitions through repeated cross-sectional surveys. The technique allows the creation of a “synthetic panel” – done by predicting future or past household income or consumption using a set of simple modeling and error structure assumptions – and thus permits the estimation of lower and upper bounds of the joint distribution of poverty and non-poverty transitions. We validate the approach in three different settings where good panel data exist (Chile, Nicaragua, and Peru). In doing so, we also carry out a number of refinements to the validation procedure and expand the set of tests undertaken. The results are broadly encouraging in estimating the joint probabilities of poverty and non-poverty transitions between two periods in all three contexts. The approach is also robust to a broad set of additional “stress” and sensitivity tests, especially in cases where richer model specifications can
    be estimated. Finally, we test whether the scope of synthetic panels can be expanded in three new directions, namely comparing between income and consumption welfare measures; the robustness to longer intervals (the approach does especially well in predicting long-term poverty transition patterns); and the robustness to two transition lines instead of one. Overall, the results lend support to the application of this approach to settings where panel data are absent. Copyright Springer Science+Business Media New York 2015
  citationApa: 'Cruces, G., Lanjouw, P., Lucchetti, L., Perova, E., Vakis, R., & Viollaz, M. (2015). Estimating poverty transitions using repeated cross-sections: a three-country validation exercise. The Journal of Economic Inequality, 13(2), 161-179. https://doi.org/10.1007/s10888-014-9284-9'
