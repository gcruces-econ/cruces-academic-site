- title: 'Income and Beyond: Multidimensional Poverty in Six Latin American Countries'
  authors: Diego Battiston & Guillermo Cruces & Luis Lopez-Calva & Maria Lugo & Maria Santos
  venue: 'Social Indicators Research: An International and Interdisciplinary Journal for Quality-of-Life Measurement'
  year: '2013'
  url: https://ideas.repec.org/a/spr/soinre/v112y2013i2p291-314.html
  description: Springer, vol. 112(2), pages 291-314, June.
  linkLabel: Open paper
  abstract: 'This paper studies multidimensional poverty for Argentina, Brazil, Chile, El Salvador, Mexico and Uruguay for the period 1992–2006. The approach overcomes the limitations of the two traditional methods of poverty analysis in Latin America (income-based and unmet basic needs) by combining income with five other dimensions: school attendance for children, education of the household head, sanitation, water and shelter. The results allow a fuller understanding of the evolution of poverty in the selected countries. Over the study period, El Salvador, Brazil, Mexico and Chile experienced significant reductions in multidimensional poverty. In contrast, in urban Uruguay there was a small reduction in multidimensional poverty, while in urban Argentina the estimates did not change significantly. El Salvador, Brazil and Mexico, and rural areas of Chile display significantly higher and more simultaneous deprivations than urban areas of Argentina, Chile and Uruguay. In all countries, deprivation
    in access to proper sanitation and education of the household head are the highest contributors to overall multidimensional poverty. Copyright Springer Science+Business Media Dordrecht 2013'
  citationApa: 'Battiston, D., Cruces, G., Lopez-Calva, L., Lugo, M., & Santos, M. (2013). Income and Beyond: Multidimensional Poverty in Six Latin American Countries. Social Indicators Research: An International and Interdisciplinary Journal for Quality-of-Life Measurement, 112(2), 291-314. https://doi.org/10.1007/s11205-013-0249-3'
