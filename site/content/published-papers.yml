- title: 'Welfare programs and labor supply in developing countries: experimental evidence from Latin America'
  authors: María Alzúa & Guillermo Cruces & Laura Ripani
  venue: Journal of Population Economics
  year: '2013'
  url: https://ideas.repec.org/a/spr/jopoec/v26y2013i4p1255-1284.html
  description: Springer;European Society for Population Economics, vol. 26(4), pages 1255-1284, October.
  linkLabel: Open paper
  abstract: 'This study looks at the effect of welfare programs on work incentives and the adult labor supply in developing countries. The analysis builds on the experimental evaluations of three programs implemented in rural areas: Mexico’s Programa Nacional de Educación, Salud y Alimentación (PROGRESA), Nicaragua’s Red de Protección Social, and Honduras’ Programa de Asignación Familiar. Comparable results for the three countries indicate that the effects that the programs have had on the labor supply of participating adults have been mostly negative but are nonetheless small and not statistically significant. However, the evidence does point to the presence of other effects on labor markets. In the case of PROGRESA, there is a small positive effect on the number of hours worked by female beneficiaries and a sizeable increase in wages among male beneficiaries and a resulting increase in household labor income. Moreover, PROGRESA seems to have reduced female labor-force participation in
    ineligible households. These results imply that large-scale interventions may have broader equilibrium effects. Copyright Springer-Verlag Berlin Heidelberg 2013'
  citationApa: 'Alzúa, M., Cruces, G., & Ripani, L. (2013). Welfare programs and labor supply in developing countries: experimental evidence from Latin America. Journal of Population Economics, 26(4), 1255-1284. https://doi.org/10.1007/s00148-012-0458-0'
