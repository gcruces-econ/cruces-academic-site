- title: 'Trade liberalization and informality in Argentina: exploring the adjustment mechanisms'
  authors: Guillermo Cruces & Guido Porto & Mariana Viollaz
  venue: Latin American Economic Review
  year: '2018'
  url: https://ideas.repec.org/a/spr/laecrv/v27y2018i1d10.1186_s40503-018-0061-1.html
  description: Springer;Centro de Investigaciòn y Docencia Económica (CIDE), vol. 27(1), pages 1-29, December.
  linkLabel: Open paper
  abstract: This paper studies the link between trade reforms and labor informality in Argentina using a long time series spanning the 1980–2001 period. We explore cross-section mechanisms, that operate at the industry level, and time-series mechanisms, that operate at a general equilibrium level. We argue that firms can substitute formal with informal workers to smooth a negative trade shock. In this setting, industries exposed to larger tariffs cuts could experience increases in informality. In general equilibrium, there can be additional aggregate impacts in both manufacturing and non-traded sectors through workers reallocation among sectors, wage adjustments, and firm entry and exit. Using the cross-section variation of the data and an instrumental variable strategy we explore empirically the cross-section mechanisms. We find that reductions in industry tariffs increase labor informality, and the effect is differentially stronger in industries with a larger share of small-size firms.
    Using the time-series variation of the data, we are able to identify some of the general equilibrium effects. We find that the fall in the average national tariff decreased aggregate informality in the manufacturing sector but increased it in the non-traded sector.
  citationApa: 'Cruces, G., Porto, G., & Viollaz, M. (2018). Trade liberalization and informality in Argentina: exploring the adjustment mechanisms. Latin American Economic Review, 27(1), 1-29. https://doi.org/10.1186/s40503-018-0061-1'
  citationBibtex: '@Article{repec:spr:laecrv:v:27:y:2018:i:1:d:10.1186_s40503-018-0061-1,

    author={Guillermo Cruces and Guido Porto and Mariana Viollaz},

    title={Trade liberalization and informality in Argentina: exploring the adjustment mechanisms},

    year={2018},

    abstract={This paper studies the link between trade reforms and labor informality in Argentina using a long time series spanning the 1980–2001 period. We explore cross-section mechanisms, that operate at the industry level, and time-series mechanisms, that operate at a general equilibrium level. We argue that firms can substitute formal with informal workers to smooth a negative trade shock. In this setting, industries exposed to larger tariffs cuts could experience increases in informality. In general equilibrium, there can be additional aggregate impacts in both manufacturing and non-traded sectors through workers reallocation among sectors, wage adjustments, and firm entry and exit. Using the cross-section variation of the data and an instrumental variable strategy we explore empirically the cross-section mechanisms. We find that reductions in industry tariffs increase labor informality, and the effect is differentially stronger in industries with a larger share of small-size firms.
    Using the time-series variation of the data, we are able to identify some of the general equilibrium effects. We find that the fall in the average national tariff decreased aggregate informality in the manufacturing sector but increased it in the non-traded sector.},

    keywords={Trade liberalization; Labor informality; Cross-section mechanisms; Time-series mechanisms; Argentina},

