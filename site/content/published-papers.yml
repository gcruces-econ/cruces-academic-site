- title: Large firms and the intensive margin of labor informality evidence from an enforcement intervention in Peru
  authors: Bosch, Mariano & Cruces, Guillermo & González, Stephanie & Silva-Porto, María Teresa
  venue: Journal of Development Economics
  year: '2026'
  url: https://ideas.repec.org/a/eee/deveco/v180y2026ics0304387825002305.html
  description: Elsevier, vol. 180(C).
  linkLabel: Open paper
  abstract: In developing countries, informal labor is not only employed by illegal or unregistered firms but also by legal firms that hire workers informally, known as the intensive margin of labor informality. Reducing this type of work may have ambiguous effects on formal employment, depending on factors such as firm size and productivity. In collaboration with Peru's labor inspection authority, we conducted a randomized mailing experiment targeting large firms with a high propensity for employing workers informally. The authority sent letters with either deterrence messages detailing fines for non-compliance or social norms messages highlighting the positive impacts of formality. We analyzed the impact of this intervention on formal employment levels over the following two years using monthly administrative data. The treated firms (particularly those in the deterrence treatment arm) and larger firms increased their formal employment levels. However, these increases followed a seasonal
    pattern coinciding with the high labor demand during the tourist season, suggesting that prior to the intervention, firms were employing temporary workers informally. The higher perceived cost of non-compliance led them to formalize some of these workers. The informal hiring of seasonal workers by these firms appears to have been motivated by basic tax evasion, and the absence of a negative effect on firm-level formal employment indicates that the firms were exploiting rents from low enforcement of regulations.
- title: 'Backlash against expert recommendations: Reactions to COVID-19 advice in Latin America'
  authors: Albornoz, Facundo & Bottan, Nicolas & Cruces, Guillermo & Hoffmann, Bridget & Lombardi, María
  venue: Journal of Economic Behavior & Organization
  year: '2024'
  url: https://ideas.repec.org/a/eee/jeborg/v228y2024ics0167268124003664.html
  description: Elsevier, vol. 228(C).
  linkLabel: Open paper
  abstract: Public adherence with health recommendations is vital for effective crisis response. During the COVID-19 pandemic, governments faced considerable challenges in persuading the public to adopt new recommendations. Using large-scale survey experiments across 12 Latin American countries, we investigate how respondents’ agreement with health recommendations is affected by their attribution to experts from different sectors. Our results uncover a robust backlash against experts for pandemic-specific recommendations, but not for more general health advice. The backlash does not depend on the type of expert (academic, public or private sector). Our experimental setup allows us to concurrently assess the significance of different factors behind these results. Anti-intellectualism plays a role, since individuals with low initial trust in experts exhibit more negative reactions to expert attribution, although the backlash is also present for those with higher levels of trust, indicating
    that other factors likely play a role. We fail to find evidence that individual perceptions or personality traits such as social pressure, altruism or reactance contribute to the backlash. Beyond individual characteristics, we find that the backlash is stronger in countries that exhibited a more stringent government response to the pandemic.
- title: Dishonesty and Public Employment
  authors: Guillermo Cruces & Martín A. Rossi & Ernesto Schargrodsky
  venue: 'American Economic Review: Insights'
  year: '2023'
  url: https://ideas.repec.org/a/aea/aerins/v5y2023i4p511-26.html
  description: American Economic Association, vol. 5(4), pages 511-526, December.
  linkLabel: Open paper
  abstract: We exploit a natural experiment to study the causal link between dishonest behavior and public employment. When military conscription was mandatory in Argentina, eligibility was determined by both a lottery and a medical examination. To avoid conscription, individuals at risk of being drafted had strong incentives to cheat in their medical examination. These incentives varied with the lottery number. Exploiting this exogenous variation, we first present evidence of cheating in medical examinations. We then show that individuals with a higher probability of having cheated in health checks exhibit a higher propensity to occupy nonmeritocratic public sector jobs later in life.
- title: 'Tax Audits as Scarecrows: Evidence from a Large-Scale Field Experiment'
  authors: Marcelo Bergolo & Rodrigo Ceni & Guillermo Cruces & Matias Giaccobasso & Ricardo Perez-Truglia
  venue: 'American Economic Journal: Economic Policy'
  year: '2023'
  url: https://ideas.repec.org/a/aea/aejpol/v15y2023i1p110-53.html
  description: American Economic Association, vol. 15(1), pages 110-153, February.
  linkLabel: Open paper
  abstract: The canonical model of Allingham and Sandmo (1972) predicts that firms evade taxes by optimally trading off between the costs and benefits of evasion. However, there is no direct evidence that firms react to audits in this way. We conducted a large-scale field experiment in collaboration with a tax authority to address this question. We sent letters to 20,440 small- and medium-sized firms that collectively paid more than US$200 million in taxes per year. We find that providing information about audits significantly affected tax compliance but in a manner that was inconsistent with Allingham and Sandmo (1972).
- title: 'Simulations of Policy Responses During the COVID-19 Crisis in Argentina: Effects on Socioeconomic Indicators'
