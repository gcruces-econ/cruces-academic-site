- title: Location, Housing and Employment Opportunities - Evidence from a Randomized Controlled Trial with Vulnerable Youth in France
  url: https://ideas.repec.org/p/sad/wpaper/180.html
  description: Vera Chiodi & Bruno Crépon & Guillermo Cruces. Working Papers. 180, Universidad de San Andres, Departamento de Economia, revised Feb 2026.
  linkLabel: Open paper
  abstract: 'Housing conditions, residential location, and employment are key determinants of individual welfare, particularly for vulnerable populations facing credit constraints and information frictions. We examine how housing assistance affects employment outcomes using a randomized controlled trial in France that provided vulnerable youth (aged 18–25) with both job search assistance and housing support, including rent guarantees. The program successfully improved housing conditions: beneficiaries experienced better accommodation stability, reduced precarious situations, and increased satisfaction with their housing. However, despite substantial social worker support, the program did not improve employment rates, contract types, or earnings. Strikingly, beneficiaries moved to neighborhoods with objectively worse employment opportunities and lower socioeconomic indicators, yet reported higher satisfaction with their residential areas. This apparent paradox reveals that beneficiaries appear
    to prioritize housing affordability and conditions over employment access. Our results suggest that successful interventions may need to explicitly balance housing improvements with maintaining access to employment opportunities.'
  status: '2026'
- title: Does Generative AI Narrow Education-Based Productivity Gaps? Evidence from a Randomized Experiment
  url: https://ideas.repec.org/p/nbr/nberwo/34851.html
  description: Guillermo Cruces & Diego Fernández Meijide & Sebastian Galiani & Ramiro H. Gálvez & María Lombardi. NBER Working Papers. 34851, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: Does generative artificial intelligence (AI) reinforce or reduce productivity differences across workers? Existing evidence largely studies AI within firms and occupations, where organizational selection compresses educational heterogeneity, leaving unclear whether AI narrows productivity gaps across individuals with substantially different levels of formal education. We address this question using a randomized online experiment conducted outside firms, in which 1,174 adults aged 25–45 with heterogeneous educational backgrounds complete an incentivized, workplace-style business problem-solving task. The task is a general (not domain-specific) exercise, and participants perform it either with or without access to a generative-AI assistant. Unlike prior work that studies heterogeneity within relatively homogeneous worker samples, our design targets the between–education-group productivity gap as the primary estimand. We find that AI increases productivity for all participants,
    with substantially larger gains for lower-education individuals. In the absence of AI access, higher-education participants outperform lower-education participants by 0.548 standard deviations; with AI access, this gap falls to 0.139 standard deviations, implying that generative AI closes three-quarters of the initial productivity gap. We interpret this pattern as evidence that generative AI narrows effective productivity differences in task execution by relaxing constraints that are more binding for lower-education individuals, even though underlying skill differences remain, as reflected in persistent education gaps in task performance and in a follow-up exercise without AI assistance.
  status: '2026'
- title: Exploring the Gender Divide in Real Estate Ownership and Property Tax Compliance
  url: https://ideas.repec.org/p/wbk/wbrwps/11060.html
  description: Flores, Tatiana & Cruces,Guillermo & Bermúdez,Jose Carlo & De Gouvea Scot de Arruda, Thiago & Schiavoni, Juan Luis & Tortarolo, Dario. Policy Research Working Paper Series. 11060, The World Bank.
  linkLabel: Open paper
  abstract: This paper investigates gender disparities in residential property ownership and tax compliance in a large Argentine municipality using detailed tax administrative data. While ownership is evenly distributed between women, men, and co-owned properties up to the 40th percentile of the value distribution, higher-value properties exhibit significant gender disparities, with women’s share dropping to less than 20% in the top 1%. Tax compliance increases with property value, with an average evasion rate of 46%, and men and women are equally likely to meet their tax obligations across the distribution. However, women face slightly higher effective tax rates due to owning lower-value properties, which are disproportionately affected by a mildly regressive tax schedule. Gender responses to enforcement measures are also comparable. A soft randomized communication campaign significantly increased timely payments equally for both men and women, with men responding more quickly. Similarly,
    the findings show no gender-based differences in responses to macroeconomic shocks such as COVID-19. The study underscores the role of property tax in promoting equitable revenue mobilization and highlights the importance of gender-disaggregated data for informing tax policy and enforcement strategies.
  status: '2025'
- title: Large Firms and the Intensive Margin of Labor Informality Evidence from an Enforcement Intervention in Peru
  url: https://ideas.repec.org/p/sad/wpaper/172.html
  description: Mariano Bosch & Guillermo Cruces & Stephanie González & María Teresa Silva-Porto. Working Papers. 172, Universidad de San Andres, Departamento de Economia, revised Sep 2025.
  linkLabel: Open paper
  abstract: In developing countries, informal labor is not only employed by illegal or unregistered firms but also by legal firms that hire workers informally, known as the intensive margin of labor informality. Reducing this type of work may have ambiguous effects on formal employment, depending on factors such as firm size and productivity. In collaboration with Peru’s labor inspection authority, we conducted a randomized mailing experiment targeting large firms with a high propensity for employing workers informally. The authority sent letters with either deterrence messages detailing fines for non-compliance or social norms messages highlighting the positive impacts of formality. We analyzed the impact of this intervention on formal employment levels over the following two years using monthly administrative data. The treated firms (particularly those in the deterrence treatment arm) and larger firms increased their formal employment levels. However, these increases followed a seasonal
    pattern coinciding with the high labor demand during the tourist season, suggesting that prior to the intervention, firms were employing temporary workers informally. The higher perceived cost of non-compliance led them to formalize some of these workers. The informal hiring of seasonal workers by these firms appears to have been motivated by basic tax evasion, and the absence of a negative effect on firm-level formal employment indicates that the firms were exploiting rents from low enforcement of regulations.
  status: '2025'
- title: 'Long-run Effects of Universal Pre-Primary Education Expansion: Evidence from Argentina'
  url: https://ideas.repec.org/p/nbr/nberwo/34552.html
  description: Samuel Berlinski & Guillermo Cruces & Sebastian Galiani & Paul Gertler & Fabian Gonzalez. NBER Working Papers. 34552, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: 'We study the long-run effects of a large public expansion of pre-primary education in Argentina. Between 1993 and 1999 the federal government financed the construction of new preschool classrooms targeted to departments with low base- line enrollment and high poverty, creating roughly 186,000 additional places. We link administrative records on classroom construction to four population censuses and estimate difference-in-differences models that compare treated and untreated cohorts across high- and low-construction departments. An additional preschool seat per child increases post-kindergarten schooling by about 0.5 years, raising the probability of completing secondary school by 11.9 percentage points and of enrolling in post-secondary education by 7.1 percentage points. For women, access to the program also reduces completed fertility: an additional seat lowers the number of live births per woman by 0.18, and we find no evidence that selective migration biases these estimates.
    We find little impact on labor-market outcomes at the census date, consistent with beneficiaries still being in school or in the early stages of their careers. A benefit-cost analysis based on the estimated schooling gains, standard Mincer returns, and observed construction and operating costs yields a benefit-cost ratio of about 11 and an internal rate of return of 13%. Our findings show that universal at-scale pre-primary expansions in middle-income countries can generate sizable improvements in human capital and demographic outcomes at relatively low fiscal cost.'
  status: '2025'
- title: 'Unraveling the Paradox of Anticorruption Messaging: Experimental Evidence from a Tax Administration Reform'
  url: https://ideas.repec.org/p/idb/brikps/13555.html
  description: Ajzenman, Nicolás & Ardanaz, Martín & Cruces, Guillermo & Feierherd, Germán & Lunghi, Ignacio. IDB Publications (Working Papers). 13555, Inter-American Development Bank.
  linkLabel: Open paper
  abstract: 'Recent literature highlights a paradox in corruption prevention messaging: instead of reducing tolerance for corruption, such campaigns can inadvertently intensify it by priming the existence of corruption while failing to diminish citizens beliefs about government misbehavior. Building on Cheeseman and Peiffer (2022), which demonstrates that messages focused on combating corruption often backfire among individuals with preexisting negative perceptions of corruption, we posit that an effective strategy to mitigate backfiring involves shifting those pessimistic perceptions before delivering the corruption eradication messages. To test our hypothesis, we conducted a randomized survey experiment within the context of a major institutional reform to reduce tax agency corruption in Honduras. Results confirm the backfiring findings of previous literature, but also show that our approach effectively mitigates perceived corruption and diminishes the propensity for tax evasion, especially
    among skeptics.'
  status: '2024'
- title: Effects of Hiring Credits on the Argentine Labor Market
  url: https://ideas.repec.org/p/dls/wpaper/0342.html
  description: Octavio Bertín & Guillermo Cruces & Fabian Enrique Gonzalez & Ignacio Lunghi & Azul Menduiña. CEDLAS, Working Papers. 0342, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: This study assesses the impact of a hiring credit policy introduced in Argentina in 2014 on various labor outcomes of firms. The reform established differentiated labor cost reductions in the employers contributions to be paid for their new employees, according to the size that firms had at a date prior to the announcement of the policy. Using a differences-in-differences approach and employer-employee administrative data, we analyze the interventionâ€™s effects. Our results show a significant 4.1 percentage point increase in employment growth rates for small firms compared to medium-sized ones, persisting for several years post-reform. This paper also explores the relationship between the interventionâ€™s effects and sector labor informality; we find a significant 6.2 percentage point increase in employment growth rates for firms in high-informality sector, whereas no significant effect is found for firms in low-informality sectors.
  status: '2024'
- title: From Flat to Fair? The Effects of a Progressive Tax Reform
  url: https://ideas.repec.org/p/nbr/nberwo/33286.html
  description: Nicolas Ajzenman & Guillermo Cruces & Ricardo Perez-Truglia & Darío Tortarolo & Gonzalo Vazquez-Bare. NBER Working Papers. 33286, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: 'We study the effects of a progressive tax reform on tax compliance, using a research design that distinguishes between two channels. First, using a quasi-experimental design, we estimate the direct effects of the reform—namely, how changes in a household’s own tax rate affect its own compliance. Second, leveraging a large-scale natural field experiment, we estimate the indirect effects: holding a household’s own tax rate constant, we examine how its compliance is influenced by changes in the tax rates of other, poorer or richer, households. We find substantial direct effects: lowering taxes for poor households increases their compliance, while raising taxes for rich households reduces theirs. We also find sizable indirect effects: when poor households learn about the tax hikes on the rich, their stated perceptions of tax fairness and their actual compliance both increase. Among rich households, learning about tax cuts for the poor also improves perceived fairness, but, if anything,
    reduces compliance. Using an additional reform and follow-up field experiment conducted a year later, we replicate both the quasi-experimental and experimental results. Together, our findings show that tax compliance responds not only to a household’s own tax burden but also to its perception of fairness of the broader tax system. Our results also underscore the potential disconnect between stated and revealed preferences for redistribution. Finally, we present a counterfactual analysis that illustrates the implications of the direct and indirect effects for designing progressive tax reforms.'
  status: '2024'
- title: 'Ajustando la Imagen de la Distribución del Ingreso en Argentina: Encuestas y Registros Administrativos'
  url: https://ideas.repec.org/p/dls/wpaper/0336.html
  description: Iván Albina & Luis Laguinge & Leonardo Gasparini & Leopoldo Tornarolli & Guillermo Cruces & Santiago Afonso. CEDLAS, Working Papers. 0336, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: Este trabajo provee nuevas estimaciones de la distribución del ingreso en Argentina, combinando microdatos de encuestas de hogares con información de registros administrativos. El trabajo hace uso de información públicamente disponible sobre salarios de trabajadores formales, ingresos de monotributistas, autónomos y contribuyentes del impuesto a las ganancias, jubilaciones y pensiones, y beneficios de los programas nacionales de transferencias de ingresos. En conjunto, estos ajustes permiten tener una imagen más cercana a la realidad de la distribución del ingreso en Argentina.
  status: '2024'
- title: 'Generative Artificial Intelligence and Its Implications for Labor Markets in Developing Countries: A Review Essay'
  url: https://ideas.repec.org/p/dls/wpaper/0343.html
  description: Guillermo Cruces & Verónica Amarante & Estefanía Lotitto. CEDLAS, Working Papers. 0343, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: The unprecedented developments in artificial intelligence technology and its recent widespread availability hold transformative potential to reshape global economic dynamics and labor markets, though opinions on its effects vary greatly. Transformative or not, the irruption of AI has sparked ample public discussion as well as the rapid development of theoretical and empirical approaches to understand it. This review essay discusses recent perspectives, theories, and empirical evidence on the matter, and adds a perspective of the implications of this technology and of the policy discussion it has sparked, from the perspective of developing countriesâ€™ economies. The latter is motivated by the relative scarcity of such perspectives in the current public debate, which seems to have minimized the potential effects on the interaction of labor markets between developing and developed countries, and on the potentially different within-country effects at different levels of development.
  status: '2024'
- title: Design of Partial Population Experiments with an Application to Spillovers in Tax Compliance
  url: https://ideas.repec.org/p/dls/wpaper/0337.html
  description: Guillermo Cruces & Dario Tortarolo & Gonzalo Vazquez-Bare. CEDLAS, Working Papers. 0337, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: We develop a framework to analyze partial population experiments, a generalization of the cluster experimental design where clusters are assigned to different treatment intensities. Our framework allows for heterogeneity in cluster sizes and outcome distributions. We study the large-sample behavior of OLS estimators and cluster-robust variance estimators and show that (i) ignoring cluster heterogeneity may result in severely underpowered experiments and (ii) the cluster-robust variance estimator may be upward-biased when clusters are heterogeneous. We derive formulas for power, minimum detectable effects, and optimal cluster assignment probabilities. All our results apply to cluster experiments, a particular case of our framework. We set up a potential outcomes framework to interpret the OLS estimands as causal effects. We implement our methods in a large-scale experiment to estimate the direct and spillover effects of a communication campaign on property tax compliance. We find
    an increase in tax compliance among individuals directly targeted with our mailing, as well as compliance spillovers on untreated individuals in clusters with a high proportion of treated taxpayers.
  status: '2024'
- title: 'Conditional Cash Transfers, Debit Cards and Financial Inclusion: Experimental Evidence from Argentina'
  url: https://ideas.repec.org/p/idb/brikps/13034.html
  description: Cruces, Guillermo. IDB Publications (Working Papers). 13034, Inter-American Development Bank.
  linkLabel: Open paper
  abstract: 'Cash transfer and other social protection programs in developing countries have often been accompanied by measures to foster financial inclusion, such as the adoption and use of bank accounts and electronic means of payments. Argentina''s social benefits are paid in bank accounts and accessed through debit cards. With the simultaneous objective of fostering formality among beneficiaries and stores, the use of debit cards for purchases has been incentivized by means of additional subsidies. We studied the low take-up of these extra benefits by means of a field experiment involving 400,000 beneficiaries of Argentinas largest conditional cash-transfer program (with 2.2 million beneficiaries who are the parents of four million children, 40% of the countrys 0-17-year olds). By using their debit card to spend the allowance, rather than withdrawing cash from ATMs, they can receive a rebate of 15% of their expenditures. However, they systematically fail to claim this benefit: only about
    25% of beneficiaries receive this transfer. Our experiment provided information about the effectiveness of an information campaign conducted via text messages or through on-screen messages at ATM machines. The campaign increased purchases with debit cards and subsequent rebates significantly but not substantially in the short run. However, beneficiaries who increased their use of debit cards do not exhibit a higher probability of having access to credit through the financial system, nor higher levels of formal employment. The results indicate that cultural factors (a preference for cash), administrative hassle and citizen security issues are relevant issues that limit the potential of financial inclusion through increased use of digital means of payment.'
  status: '2023'
- title: 'Trusting Covid-19 recommendations: The role of experts, markets and governments'
  url: https://ideas.repec.org/p/idb/brikps/13055.html
  description: Albornoz, Facundo & Cruces, Guillermo & Lombardi, María. IDB Publications (Working Papers). 13055, Inter-American Development Bank.
  linkLabel: Open paper
  abstract: Do individuals trust experts' advice? Does the sector represented by these experts matter for trust and compliance? Do individuals prefer the public or the private sector for large-scale responses to events such as the pandemic? We answer these questions by means of a large-scale survey on a representative sample of 9,444 respondents from Argentina, Bolivia, Colombia, Ecuador, Mexico, Peru and Uruguay. We study if opinions on risk-mitigating actions against Covid-19 are shaped by expert recommendations and the sectors they represent. We identify a backlash against experts' recommendations that is robust across expert sectors and countries, and more pronounced for recommendations that require more effort to implement. We also find that, even for individuals with a low level of trust in the public sector, there is widespread agreement that governments should be preferred over the private sector to lead the production and distribution of vaccines. Most respondents, even those expressing
    distrust in governments, believe that governments should get involved in producing the vaccine for Covid-19, either exclusively or in a partnership with the private sector. This result is stronger for the distribution of the vaccine than for its production.
  status: '2023'
- title: Dishonesty and Public Employment
  url: https://ideas.repec.org/p/sad/wpaper/168.html
  description: Guillermo Cruces & Martín A. Rossi & Ernesto Schargrodsky. Working Papers. 168, Universidad de San Andres, Departamento de Economia, revised Nov 2023.
  linkLabel: Open paper
  abstract: We exploit a natural experiment to study the causal link between dishonest behavior and public employment. When military conscription was mandatory in Argentina, eligibility was determined by both a lottery and a medical examination. To avoid conscription, individuals at risk of being drafted had strong incentives to cheat in their medical examination. These incentives varied with the lottery number. Exploiting this exogenous variation, we first present evidence of cheating in medical examinations. We then show that individuals with a higher probability of having cheated in health checks exhibit a higher propensity to occupy non-meritocratic public sector jobs later in life.
  status: '2023'
- title: 'Backlash Against Expert Recommendations: Reactions to COVID-19 Advice in Latin America'
  url: https://ideas.repec.org/p/cpr/ceprdp/17506.html
  description: Albornoz-Crespo, Facundo & Bottan, Nicolas & Cruces, Guillermo & Hoffmann, Bridget & Lombardi, María. CEPR Discussion Papers. 17506, C.E.P.R. Discussion Papers.
  linkLabel: Open paper
  abstract: 'Health recommendations are key to tackling public health crises. We study the effect of attributing health recommendations to experts on agreement using a series of large survey experiments in twelve Latin American countries. We document a robust backlash against experts: agreement with recommendations is lower when these are phrased as originating from an expert. This backlash is only present for the recommendations that are specific to the pandemic and does not depend on the type of expert (academic, public or private sector). For individuals initially reporting low levels of trust in experts, agreement with all recommendations is lower when they are attributed to experts as compared to individuals who trust experts, indicating that anti-intellectualism plays a role in expert backlash but cannot fully explain the differential pattern of expert backlash that we observe across recommendations. We find suggestive evidence that individual traits and perceptions of social pressure
    could contribute to these backlash effects.'
  status: '2022'
- title: Design of two-stage experiments with an application to spillovers in tax compliance
  url: https://ideas.repec.org/p/ifs/ifsewp/22-32.html
  description: Guillermo Cruces & Dario Tortarolo & Gonzalo Vazquez-Bare. IFS Working Papers. W22/32, Institute for Fiscal Studies.
  linkLabel: Open paper
  status: '2022'
- title: Information, Price, and Barriers to Adoption and Usage of Mobile Money Evidence from a Field Experiment in The Gambia
  url: https://ideas.repec.org/p/lvl/piercr/2020-17.html
  description: 'Guillermo Cruces Author-Name: Hamidou Jawara Author-Name: Adama Touray Author-Name: Fatoumata Singhateh. Working Papers PIERI. 2020-17, PEP-PIERI.'
  linkLabel: Open paper
  abstract: 'Mobile money has been heralded as a way to foster financial inclusion. While it has become popular in developing countries, most notably in African nations, there are still strong barriers to its adoption and usage. The purpose of this study is to examine the extent to which a lack of information and high prices are limiting factors in the adoption of mobile money. We implemented a simple randomized controlled trial among a group of difficult-to- access potential users: mobile phone users in The Gambia who had opened mobile money wallets but had not made a transaction. We offered meaningful price discounts on withdrawal charges, and made these discounts salient by reminding users about them every month for a period of six months. Our analysis measures different dimensions of mobile money use by drawing from administrative mobile phone company records. We also carried out a post- treatment survey to gauge knowledge about, and attitudes towards, mobile money. Our results indicate
    that treated individuals were substantially more aware than controls about the uses of mobile wallets and about the meaningful discounts of 15% and 30% offered. However, only a small fraction of treated individuals started using mobile wallets, and the difference was not statistically significant. Perceptions of safety, trust in the platform, and service reliability were not significantly different between treated and controls. However, treated individuals were more likely to perceive the service charges to be expensive. We interpret this as evidence that our population of interest was uninformed about the platform at large. While our treatment increased awareness about its capabilities and operation, potentially fostering its adoption, it also increased awareness of the relatively high fees it involves, which in turn limited usage. Both a lack of information and high prices need to be addressed to foster the adoption and usage of mobile money in developing countries.'
  status: '2020'
- title: 'It takes two to tango: Labour responses to an income tax holiday in Argentina'
  url: https://ideas.repec.org/p/not/notnic/2020-07.html
  description: Dario Tortarolo & Guillermo Cruces & Victoria Castillo. Discussion Papers. 2020-07, Nottingham Interdisciplinary Centre for Economic and Political Research (NICEP).
  linkLabel: Open paper
  abstract: We exploit a large, quasi-randomized, 2.5-year-long income tax holiday to identify intertemporal labor responses of high-wage earners to net wage changes. In August 2013, the Argentine government exempted a group of wage earners from the income tax for 2.5 years while leaving in place the tax on other high-wage earners. Eligibility was based on whether past wage earnings were below a fixed threshold, thus levying sharply different marginal and average tax rates—effectively 0% for workers below the threshold. Using rich population-wide administrative data and a regression discontinuity design, we estimate a precise and very small wage earnings elasticity of 0.017 for this large, salient, and temporary income tax change. Responses are larger for more flexible outcomes (overtime hours) and for more elastic groups (job switchers and managers). We also find avoidance responses from new entrants who faced no tax if their first monthly wage was below the fixed threshold. This strategic
    entry below the threshold to dodge taxes required coordination with employers. Our findings indicate rigidities in the labor market that require employer-employee cooperation to be overcome for wage earners to be able to respond to tax changes.
  status: '2020'
- title: 'Tax Audits as Scarecrows: Evidence from a Large-Scale Field Experiment'
  url: https://ideas.repec.org/p/dls/wpaper/0254.html
  description: Marcelo Bergolo & Rodrigo Ceni & Guillermo Cruces & Matias Giaccobasso & Ricardo Perez Truglia. CEDLAS, Working Papers. 0254, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: The canonical model of Allingham and Sandmo (1972) predicts that firms evade taxes by optimally trading off between the costs and benefits of evasion. However, there is no direct evidence that firms react to audits in this way. We conducted a large-scale field experiment in collaboration with Uruguay’s tax authority to address this question. We sent letters to 20,440 small- and medium-sized firms that collectively paid more than 200 million dollars in taxes per year. Our letters provided exogenous yet nondeceptive signals about key inputs for their evasion decisions, such as audit probabilities and penalty rates. We measured the effect of these signals on their subsequent perceptions about the auditing process, based on survey data, as well as on the actual taxes paid, based on administrative data. We find that providing information about audits had a significant effect on tax compliance but in a manner that was inconsistent with Allingham and Sandmo (1972). Our findings are
    consistent with an alternative model, risk-as-feelings, in which messages about audits generate fear and induce probability neglect. According to this model, audits may deter tax evasion in the same way that scarecrows frighten off birds.
  status: '2019'
- title: A short episodic history of income distribution in Argentina
  url: https://ideas.repec.org/p/hal/journl/hal-01784299.html
  description: Facundo Alvaredo & Guillermo Cruces & Leonardo Gasparini. Post-Print. hal-01784299, HAL.
  linkLabel: Open paper
  abstract: In this paper, we use tax and household survey data to assess the history of income distribution in Argentina since the beginning of the 20th century. Until the 1970s, the country experienced a fall in inequality in spite of lower income growth. Since then, inequality has generally increased possibly as a result of large-scale shocks such as macroeconomic crises and reform attempts, resulting in a convergence towards traditionally more unequal neighboring countries.
  status: '2018'
- title: 'Trade Liberalization and Informality in Argentina: Exploring the Adjustment Mechanisms'
  url: https://ideas.repec.org/p/dls/wpaper/0229.html
  description: Guillermo Cruces & Guido Porto & Mariana Viollaz. CEDLAS, Working Papers. 0229, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: This paper studies the link between trade reforms and labor informality in Argentina using a long time series spanning the 1980-2001 period. We explore cross-section mechanisms, that operate at the industry level, and time-series mechanisms, that operate at a general equilibrium level. We argue that firms can substitute formal with informal workers to smooth a negative trade shock. In this setting, industries exposed to larger tariffs cuts could experience increases in informality. In general equilibrium, there can be additional aggregate impacts in both manufacturing and non-traded sectors through workers reallocation between sectors, wage adjustments, and firm entry and exit. Using the cross-section variation of the data and an instrumental variable strategy we explore empirically the cross-section mechanisms. We find that reductions in industry tariffs increase labor informality, and the effect is differentially stronger in industries with a larger share of small size firms.
    Using the time-series variation of the data, we are able to identify some of the general equilibrium effects. We find that the fall in the average national tariff decreased aggregate informality in the manufacturing sector but increased it in the non-traded sector.
  status: '2018'
- title: 'Living Up to Expectations: How Job Training Made Women Better Off and Men Worse Off'
  url: https://ideas.repec.org/p/nbr/nberwo/23264.html
  description: Paloma Acevedo & Guillermo Cruces & Paul Gertler & Sebastian Martinez. NBER Working Papers. 23264, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: 'We study the interaction between job and soft skills training on expectations and labor market outcomes in the context of a youth training program in the Dominican Republic. Program applicants were randomly assigned to one of 3 modalities: a full treatment consisting of hard and soft skills training plus an internship, a partial treatment consisting of soft skills training plus an internship, or a control group. We find strong and lasting effects of the program on personal skills acquisition and expectations, but these results are markedly different for young men and young women. Shortly after completing the program, both male and female participants report increased expectations for improved employment and livelihoods. This result is reversed for male participants in the long run, a result that can be attributed to the program’s negative short-run effects on labor market outcomes for males. While these effects seem to dissipate in the long run, employed men are substantially
    more likely to be searching for another job. On the other hand, women experience improved labor market outcomes in the short run and exhibit substantially higher levels of personal skills in the long run. These results translate into women being more optimistic, having higher self-esteem and lower fertility in the long run. Our results suggest that job-training programs of this type can be transformative – for women, life skills mattered and made a difference, but they can also have a downside if, like in this case for men, training creates expectations that are not met.'
  status: '2017'
- title: 'Educational Upgrading and Returns to Skills in Latin America: Evidence from a Supply-Demand Framework'
  url: https://ideas.repec.org/p/nbr/nberwo/24015.html
  description: Sebastian Galiani & Guillermo Cruces & Pablo Acosta & Leonardo C. Gasparini. NBER Working Papers. 24015, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: 'This paper documents the evolution of wage differentials and the supply of workers by educational level for sixteen Latin American countries over the period 1991-2013. We find a pattern of rather constant rise in the relative supply of skilled and semi-skilled workers over the period. Whereas the returns to secondary education fell over time, in contrast, the returns to tertiary education display a remarkable changing pattern common to almost all economies: significant increase in the 1990s, strong fall in the 2000s and a deceleration of that fall in the 2010s. We conclude that supply-side factors seem to have limited explanatory power relative to demand-side factors in accounting for changes in the wage gap between workers with tertiary education and the rest.'
  status: '2017'
- title: Housing Subsidies, Labor Supply and Household Welfare. Experimental Evidence from Argentina
  url: https://ideas.repec.org/p/dbl/dblwop/971.html
  description: Alzúa, María Laura & Amendolaggine, Julián & Cruces, Guillermo & Greppi, Catrihel. Research Department working papers. 971, CAF Development Bank Of Latinamerica.
  linkLabel: Open paper
  abstract: We study the impact of a social housing policy program implemented in Argentina, exploiting the random assignment rule to identify the policy's causal effect on labor market and other socio-economic outcomes. In particular, this paper evaluates an intervention that combines access to quality housing at a heavily subsidized cost, the granting of property rights, and relocation in a suburb of Rosario, Argentina's third largest city. In a preliminary analysis, based on administrative social security records, we find that the policy generates a reduction in registered employment by more than 7 percentage points, especially for women and beneficiaries over 50 years of age. We went further and conducted a purposely-designed household survey among a sample of beneficiaries in order to understand the underlying mechanisms and welfare implications of these results. All in all, our analysis points to the existence of an income effect and confirms the registered fall in formal employment
    and labor force participation. We do not find an increase in informalization, although beneficiaries' perceived access to local job opportunities are signicantly reduced.
  status: '2016'
- title: 'The Growth-Employment-Poverty Nexus in Latin America in the 2000s: Cross-Country Analysis'
  url: https://ideas.repec.org/p/dls/wpaper/0200.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. CEDLAS, Working Papers. 0200, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: In the great majority of Latin American countries in the 2000s, economic growth took place and brought about improvements in almost all labour market indicators and consequent reductions in poverty rates. Across countries, economic growth was not all that mattered; external factors were particularly important for changes in labour market conditions, while reductions in poverty were strongly related to improvements in earnings and employment indicators. Although the 2008 crisis affected some countries differently from others, nearly all labour market indicators were at least as high or higher by 2012 than immediately before the crisis in all countries but one.
  status: '2016'
- title: 'Learning from Potentially-Biased Statistics: Household Inflation Perceptions and Expectations in Argentina'
  url: https://ideas.repec.org/p/nbr/nberwo/22103.html
  description: Alberto Cavallo & Guillermo Cruces & Ricardo Perez-Truglia. NBER Working Papers. 22103, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: When forming expectations, households may be influenced by the possibility that the information they receive is biased. In this paper, we study how individuals learn from potentially-biased statistics using data from both a natural and a survey-based experiment obtained during a period of government manipulation of inflation statistics in Argentina (2006-2015). This period is interesting because of the attention to inflation information and the availability of both official and unofficial statistics. Our evidence suggests that rather than ignoring biased statistics or navively taking them at face value, households react in a sophisticated way, as predicted by a Bayesian learning model, effectively de-biasing the official data to extract all its useful content. We also find evidence of an asymmetric reaction to inflation signals, with expectations changing more when the inflation rate rises than when it falls. These results are useful for understanding the formation of inflation
    expectations in less extreme contexts than Argentina, such as the United States and Europe, where experts may agree that statistics are unbiased but households do not.
  status: '2016'
- title: 'Inflation Expectations, Learning and Supermarket Prices: Evidence from Survey Experiments'
  url: https://ideas.repec.org/p/feb/artefa/00542.html
  description: Alberto Cavallo & Guillermo Cruces & Ricardo Perez-Truglia. Artefactual Field Experiments. 00542, The Field Experiments Website.
  linkLabel: Open paper
  abstract: 'Information frictions play a central role in the formation of household inflation expectations, but there is no consensus about their origins. We address this question with novel evidence from survey experiments. We document two main findings. First, individuals in lower-inflation contexts have significantly weaker priors about the inflation rate. This finding suggests that rational inattention may be an important source of information frictions. Second, cognitive limitations also appear to be a source of information frictions: even when information about inflation statistics is made readily available, individuals still place a significant weight on less accurate sources of information, such as their memories of the price changes of the supermarket products they purchase. We discuss the implications of these findings for macroeconomic models and policy-making.'
  status: '2016'
- title: The Anatomy of Behavioral Responses to Social Assistance when Informal Employment is High
  url: https://ideas.repec.org/p/dls/wpaper/0204.html
  description: Marcelo Bergolo & Guillermo Cruces. CEDLAS, Working Papers. 0204, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: 'The disincentive effects of social assistance programs on registered (or formal) employment are a first order policy concern in developing and middle income countries. Means tests determine eligibility with respect to some income threshold, and governments can only verify earnings from registered employment. The loss of benefit at some level of formal earnings is an implicit tax – a notch – that results in a strong disincentive for formal employment, and there is extensive evidence on its effects. We study an income-tested program in Uruguay and extend this literature by developing an anatomy of the behavioral responses to this program and by establishing its welfare implications in full. Our identification strategy is based on a sharp discontinuity in the program’s eligibility rule. We rely on information on the universe of applicants to the program for the period 2004-2012 (about 400,000 individuals) from the program’s records, from administrative data on registered employment
    from the social security administration, and from a complementary follow-up survey with information on informal work. We construct the anatomy of the program’s effects along four dimensions. First, we establish that, as predicted by the theory, beneficiaries respond to the program’s incentives by reducing their levels of registered employment by about 8 percentage points. Second, we find substantial heterogeneity in these effects: the program induces a larger reduction of formal employment for individuals with a medium probability to be a registered employee, suggesting some form of segmentation – those with a low propensity to work formally do not respond to the financial incentives of the program, probably because they have limited opportunities in the labor market to begin with. Third, the follow-up survey allows us to establish that the fall in registered employment is due to a larger extent (about two thirds) to an increase in unregistered employment, and to a lesser extent (about
    one third) to a shift towards non-employment. Fourth, we find an elasticity of participation in registered employment of about 1.7. These results imply a deadweight loss from the behavioral responses to the program of about 3.2% of total registered labor income.'
  status: '2016'
- title: 'Chronicle of a Deceleration Foretold: Income inequality in Latin America in the 2010s'
  url: https://ideas.repec.org/p/dls/wpaper/0198.html
  description: Leonardo Gasparini & Guillermo Cruces & Leopoldo Tornarolli. CEDLAS, Working Papers. 0198, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: After a decade of strong progress toward the goal of reducing the high levels of income disparities, there are clear signs of a deceleration in the pace of inequality reduction in Latin America. This paper argues that the deceleration is the result of two set of reasons. First, several of the driving factors of the fall in inequality in the 2000s have lost strength, due to “natural” motives; and second, the external conditions faced by the Latin American economies have worsened in the early 2010s, making further reductions in inequality more difficult.
  status: '2016'
- title: 'Long Run Effects of Youth Training Programs: Experimental Evidence from Argentina'
  url: https://ideas.repec.org/p/iza/izadps/dp9784.html
  description: Alzúa, María Laura & Cruces, Guillermo & Lopez, Carolina. IZA Discussion Papers. 9784, IZA Network @ LISER.
  linkLabel: Open paper
  abstract: We study the effect of a job training program for low income youth in Cordoba, Argentina. The program included life-skills and vocational training, as well as internships with private sector employers. Participants were allocated by means of a public lottery. We rely on administrative data on formal employment, employment spells and earnings, to establish the effects of the program in the short term (18 months), but also â€“ exceptionally for programs of this type in Latin America and in developing countries in general â€“ in the medium term (33 months) and in the long term (48 months). The results indicate sizable gains of about 8 percentage points in formal employment in the short term (about 32% higher than the control group), although these effects dissipate in the medium and in the long term. Contrary to previous results for similar programs in the region, the effects are substantially larger for men, although they also seem to fade in the long run. Program participants
    also exhibit earnings about 40% higher than those in the control group, and an analysis of bounds indicates that these gains result from both higher employment levels and higher wages. The detailed administrative records also allow us to shed some light on the possible mechanisms underlying these effects. A dynamic analysis of employment transitions indicates that the program operated through an increase in the persistence of employment rather than from more frequent entries into employment. The earnings effect and the higher persistence of employment suggest that the program was successful in increasing the human capital of participants, although the transient nature of these results may also reflect better matches from a program-induced increase in informal contacts or formal intermediation.
  status: '2016'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Ecuador country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-076.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-076, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: Ecuador experienced moderate economic growth during the 2000s. The economy suffered a mild recession during the international crisis of 2008, but returned to pre-recession GDP per capita level in 2010. Most labour market indicators improved over the period. The only indicator that worsened was the employment structure by occupational position. Most labour market indicators were affected negatively by the international crisis but recovered their pre-crisis levels by 2012. The only exception was labour earnings for some employment categories.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Paraguay country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-081.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-081, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: During the 2000s Paraguay experienced slow economic growth but improved all labour market indicators. The growth process was erratic. Paraguay underwent a macroeconomic crisis at the beginning of the period, a recession as a consequence of the international crisis of 2008, and a local crisis in 2012. Most labour market indicators improved between 2001 and 2013 following the erratic pattern of GDP. The only labour market indicator that improved almost steadily over the period was the educational level of the employed population.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Peru country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-082.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-082, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: The Peruvian economy performed exceptionally well between 2000 and 2012, with a growth performance that placed the country well above the regional average and an improvement in all labour market indicators. The economy suffered a slowdown as a consequence of the international crisis of 2008, but Peru sustained positive GDP growth rates during that episode and had only a small reduction in GDP per capita.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: El Salvador country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-077.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-077, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: During the 2000s, El Salvador experienced slow economic growth for Latin American standards. The country underwent a recession during the international crisis of 2008, but returned to pre-recession output level in 2011. Changes in labour market conditions were mixed. The unemployment rate fell, and the mix of employment by occupations, economic sector, and education improved slightly. However, the employment mix by occupational position deteriorated, and the share of registered workers and earnings decreased.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Honduras country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-078.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-078, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: During the 2000s Honduras grew less than the average Latin American country and labour market indicators moved, in general, in a worsening direction. The only exceptions were the reduction in the unemployment rate and the improvements in the mix of employment by occupational group and educational level. The country underwent a recession as a consequence of the international crisis of 2008, from which it had not fully recovered by 2012. Most labour market indicators were affected negatively by the crisis, and the majority of them had not recovered their pre-crisis levels by 2012.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Argentina country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-069.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-069, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: Argentina experienced a decline in the early years of the 2000s, from 2000 to 2002, in GDP and in most labour market indicators, followed by improvements in nearly all of them, tracing out a U-shaped pattern. The international crisis of 2008 impacted negatively only on the unemployment rate and the share of paid employees, but both returned to their pre-crisis levels by 2010. Notwithstanding Argentina's massive downturn from 2000 to 2002 and the international crisis of 2008, labour market conditions were in a better state in 2012 than they were at the start of the millennium.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Dominican Republic country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-075.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-075, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: 'During the 2000s, the Dominican Republic experienced above-average economic growth along with mixed results in labour market indicators. GDP per capita stagnated through 2004 and, for the most part, grew rapidly from 2005 through 2012. Comparing 2000 with 2012, many unfavourable developments were seen. Among them: an increase in unemployment; worsening in the employment composition by occupation and position; a substantial fall in labour earnings; and no progress in reducing poverty.'
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Costa Rica country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-074.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-074, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: In the 2000s, Costa Rica experienced moderate economic growth and a general improvement in labour market conditions. From 2000 to 2012, Costa Rica grew at the Latin American average. Most labour market indicators improved during 2001-09 and 2010-12 (the series with comparable data). However, the unemployment rate increased in both periods, the mix of employment by occupations polarized from 2010 to 2012, and some poverty and inequality indicators increased from 2010 to 2012.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Chile country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-072.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-072, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: 'During the 2000s Chile achieved rapid economic growth and improved most labour market indicators: the unemployment rate fell; the mix of employment by occupational position and sector improved; the educational level of the employed population, the percentage of registered workers, and labour earnings increased; and all poverty and inequality indicators decreased. The economy suffered a recession during the international crisis of 2008, but recovered quickly. Some labour market indicators were negatively affected by the crisis.'
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Colombia country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-073.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-073, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: Between 2000 and 2013, Colombia experienced rapid economic growth. The country suffered a slowdown at the beginning of the period and during the international crisis of 2008, but during both slowdowns, the growth rate never turned negative. Most labour market indicators improved and followed the pattern of economic growth over the period. The only labour market indicator that did not improve between 2001 and 2013 was the employment structure by occupational position.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Mexico country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-079.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-079, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: During the 2000s Mexico grew less than the average for Latin America. Labour market indicators exhibited mixed changes, with improvements over the period for some of them and deterioration for others. The country was severely hurt by the international crisis of 2008, but Mexico surpassed its pre-crisis output levels by 2012. Most labour market indicators were affected negatively by the crisis, and labour earnings and poverty indicators had not recovered their pre-crisis levels by 2012.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Venezuela country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-084.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-084, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: Venezuela experienced slow economic growth during the 2000s. The economy suffered a recession in the early years of the period and during the international crisis of 2008, but most labour market indicators improved and moved along with the business cycle over the period. The only indicators that did not improve were the composition of employment by occupational position and the percentage of workers registered with social security, which remained essentially unchanged.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Bolivia country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-070.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-070, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: During the 2000s Bolivia experienced moderate economic growth and improved all labour market indicators. The economy suffered a slowdown as a consequence of the international crisis of 2008, but Bolivia sustained positive growth rates during that episode. The unemployment rate fell between 2000 and 2012. The composition of employment by occupational groups, occupational positions, economic sectors, and educational levels improved, and the share of registered workers increased. All poverty and inequality indicators decreased substantially between 2000 and 2012.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Panama country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-080.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-080, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: 'Between 2000 and 2012, Panama boasted the strongest economic growth in Latin America. The growth experience was not uniform: the 2000-02 period was marked by slow or negative growth rates, after which growth was exceptionally rapid. Although the international economic crisis of 2008 slowed the growth process down, it rebounded in the years following the crisis. Labour market indicators have clearly improved.'
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Uruguay country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-083.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-083, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: The Uruguayan story was one of declines in the early years of the 2000s in most indicators, followed by improvements in all of them. Economic growth was negative in the early years due to a severe economic crisis, positive and rapid thereafter except during the international crisis of 2008. Most labour indicators followed the same U-shaped pattern and were in 2012 at a better level than at the beginning of the decade, with the exceptions of labour earnings and some poverty indicators.
  status: '2015'
- title: Youth Training Programs Beyond Employment. Experimental Evidence from Argentina
  url: https://ideas.repec.org/p/dls/wpaper/0177.html
  description: María Laura Alzúa & Guillermo Cruces & Carolina Lopez. CEDLAS, Working Papers. 0177, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: Youth training programs and their evaluations are ubiquitous, yet there is relatively little evidence on the mechanisms through which they operate and their effect on outcomes beyond the labor market. This is the motivation of our study of entra21, a job training program for low income youth in Cordoba, Argentina. The program included life-skills and vocational training, as well as internships with private sector employers. Participants were allocated by means of a public lottery. We rely on detailed monthly administrative records for program participants, from which we construct a panel dataset including formal employment status, employment spells, earnings and welfare participation. These administrative records allow us to establish the effects of the program in the short term (18 months), but also – exceptionally for programs of this type in Latin America – in the medium term (36 months). The results indicate sizable gains of about 8 percentage points in formal employment
    in the short term (about 32% higher than the control group), although these effects tend to dissipate in the medium term. Contrary to what has been found for similar programs in the region, the effects of entra21 are substantially stronger for men, for whom the effects persist in the medium run. A dynamic analysis of employment transitions indicates that the program operates through an increase in the persistence of formal employment rather than from more frequent entries into employment. Program participants also exhibit earnings up to 50% higher than those in the control group, and an analysis of bounds indicates that these gains result from both higher employment levels and higher wages. The higher persistence and higher earnings suggest that the program was successful in increasing the human capital of participants rather than (or in addition to) providing contacts or formal intermediation. With respect to results beyond employment, women selected for the program exhibit lower levels
    of welfare dependency – younger participants (aged 18 to 24) are less likely to receive child-related public cash transfers over the whole period of analysis. Finally, we present original evidence on the relationship between formal employment and consumer credit use. Program participants exhibit a higher probability of having requested consumer credit, and a higher probability of holding bank debts in good standing. These results indicate that training and internship programs directed at disadvantaged youth can provide other indirect benefits that are not usually accounted for in existing evaluations.
  status: '2015'
- title: 'The growth-employment-poverty nexus in Latin America in the 2000s: Brazil country study'
  url: https://ideas.repec.org/p/unu/wpaper/wp-2015-71.html
  description: Guillermo Cruces & Gary S. Fields & David Jaume & Mariana Viollaz. WIDER Working Paper Series. wp-2015-71, World Institute for Development Economic Research (UNU-WIDER).
  linkLabel: Open paper
  abstract: During the 2000s, Brazil experienced slow economic growth and a substantial improvement in labour market indicators. From 2001 to 2012, Brazil grew less than the Latin American average. However, the unemployment rate decreased, the employment composition improved, the educational level of workers rose, the share of registered workers increased, and average labour earnings went up. At the same time, poverty and inequality largely diminished.
  status: '2015'
- title: La Segregación Escolar Público-Privado en América Latina
  url: https://ideas.repec.org/p/dls/wpaper/0167.html
  description: Malena Arcidiácono & Guillermo Cruces & Leonardo Gasparini & David Jaume & Monserrat Serio & Emmanuel Vázquez. CEDLAS, Working Papers. 0167, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: En este trabajo se documenta y analiza la segregación escolar entre alumnos de distintos estratos socioeconómicos que asisten a escuelas públicas y privadas en América Latina. El trabajo contribuye con evidencia empírica a la medición de este fenómeno desde principios de los noventa hasta la actualidad. Los resultados sugieren que en promedio el grado de segregación escolar público-privado en América Latina habría aumentado en las últimas dos décadas.
  status: '2014'
- title: Inflation Expectations, Learning and Supermarket Prices
  url: https://ideas.repec.org/p/nbr/nberwo/20576.html
  description: Alberto Cavallo & Guillermo Cruces & Ricardo Perez-Truglia. NBER Working Papers. 20576, National Bureau of Economic Research, Inc.
  linkLabel: Open paper
  abstract: 'Information frictions play a central role in the formation of household inflation expectations, but there is no consensus about their origins. We address this question with novel evidence from survey experiments. We document two main findings. First, individuals in lower-inflation contexts have significantly weaker priors about the inflation rate. This finding suggests that rational inattention may be an important source of information frictions. Second, cognitive limitations also appear to be a source of information frictions: even when information about inflation statistics is made readily available, individuals still place a significant weight on less accurate sources of information, such as their memories of the price changes of the supermarket products they purchase. We discuss the implications of these findings for macroeconomic models and policy-making.'
  status: '2014'
- title: La segregación escolar público-privada en América Latina
  url: https://ideas.repec.org/p/ecr/col041/36757.html
  description: Arcidiácono, Malena & Cruces, Guillermo Antonio & Gasparini, Leonardo & Jaume, David & Serio, Montserrat & Vázquez, Emmanuel. Políticas Sociales. 36757, Naciones Unidas Comisión Económica para América Latina y el Caribe (CEPAL).
  linkLabel: Open paper
  abstract: En este trabajo se documenta y analiza la segregación escolar entre alumnos de distintos estratos socioeconómicos que asisten a escuelas públicas y privadas en América Latina. El trabajo contribuye con evidencia empírica a la medición de este fenómeno desde principios de los noventa hasta la actualidad. Los resultados sugieren que en promedio el grado de segregación escolar público-privado en América Latina habría aumentado en las últimas dos décadas.
  status: '2014'
- title: Work and tax evasion incentive effects of social insurance programs. Evidence from an employment-based benefit extension
  url: https://ideas.repec.org/p/dls/wpaper/0161.html
  description: Marcelo Bergolo & Guillermo Cruces. CEDLAS, Working Papers. 0161, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: This article studies how social insurance programs shape individual’s incentives to take up registered employment and to report earnings to the tax authorities. The analysis is based on a social insurance reform in Uruguay that extended healthcare coverage to the dependent children of registered private-sector workers. The identification strategy relies on a comparison between individuals with and without dependent children before and after the reform. The reform increased benefit-eligible registered employment by 1.6 percentage points (about 5 percent above the prereform level), mainly due to an increase in labor force participation rather than to movement from unregistered to registered employment. The shift was greater for parents with younger children and for cohabiting adults whose partners’ jobs did not provide the couples’ children with access to the benefit. Finally, the reform increased the incidence of underreporting of salaried earnings by about 4 percentage points
    (25 percent higher than the pre-reform level), mostly for workers employed at small firms. The increase in fiscal revenue from higher levels of registered employment was several orders of magnitude greater than the loss of revenue due to an increase in underreporting.
  status: '2014'
- title: Políticas Sociales para la Reducción de la Desigualdad y la Pobreza en América Latina y el Caribe. Diagnóstico, Propuesta y Proyecciones en Base a la Experiencia Reciente"
  url: https://ideas.repec.org/p/dls/wpaper/0142.html
  description: Guillermo Cruces & Leonardo Gasparini. CEDLAS, Working Papers. 0142, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: Este trabajo obtuvo el Premio Fundación Vidanta 2012 “Contribuciones a la reducción de la pobreza y la desigualdad en América Latina y el Caribe”. El material utilizado para este documento fue producido en el marco del proyecto de investigación “Mercados de Trabajo para el Crecimiento Inclusivo en América Latina”, desarrollado en el CEDLAS con el apoyo del Centro Internacional de Investigaciones para el Desarrollo (IDRC-Canadá).
  status: '2013'
- title: Are There Ethnic Inequality Traps in Education in Latin America? Empirical Evidence for Brazil and Chile
  url: https://ideas.repec.org/p/ags/peppbr/164432.html
  description: Cruces, Guillermo & Bérgolo, Marcelo & Conconi, Adriana & Ham, Andrés. PEP Policy Briefs. 164432, Partnership for Economic Policy (PEP).
  linkLabel: Open paper
  status: '2012'
- title: Are there Etchnic Inequality Traps in Education ? Empirical Evidence for Brazil and Chile
  url: https://ideas.repec.org/p/lvl/pmmacr/2012-05.html
  description: Guillermo Cruces & Marcelo Bérgolo & Andriana Conconi & Andrés Ham. Working Papers PMMA. 2012-05, PEP-PMMA.
  linkLabel: Open paper
  abstract: 'This study searches for suggestive evidence of an ethnic inequality trap in educational attainment in Brazil and Chile. The research aims to cover an existing gap in the literature on inequality traps and proposes an empirical approach to assess certain conditions which might imply its existence. The main results indicate that while average education and upward mobility have risen in both countries, ethnic disparities remain significant. In particular, the evidence is suggestive of an educational inequality trap for Afro-Brazilians, while the findings are less conclusive of a trap for indigenous individuals in Chile. These results reflect the need for targeted education policies for ethnic groups in two ways: compensation (or affirmative action) mechanisms to lower current inequality, and increasing demand and supply at higher educational levels to prevent the persistence of low level outcomes and disparities throughout the educational distribution.'
  status: '2012'
- title: Conditional Cash Transfers, Female Bargaining Power and Parental Labour Supply
  url: https://ideas.repec.org/p/idb/brikps/4136.html
  description: Novella, Rafael & Ripani, Laura & Cruces, Guillermo & Alzuá, Maria Laura. IDB Publications (Working Papers). 4136, Inter-American Development Bank.
  linkLabel: Open paper
  abstract: Recent empirical evidence has indicated that Conditional Cash Transfer (CCT) do not have an aggregate effect on adult labour supply, however little attention has been paid to the role of other intrahousehold dynamics. This paper examines how the bargaining power structure of households affects the parental labour supply response to CCT programmes. We analyse randomized experimental designs from rural areas of Honduras (PRAF), Mexico (PROGRESA), and Nicaragua (RPS), and find that CCT programmes slightly change paternal and maternal labour supply and that this effect depends on the distribution of power in the household.
  status: '2012'
- title: Educational Upgrading and Returns to Skills in Latin America. Evidence from a Supply-Demand Framework, 1990-2010
  url: https://ideas.repec.org/p/dls/wpaper/0127.html
  description: Leonardo Gasparini & Sebastián Galiani & Guillermo Cruces & Pablo Acosta. CEDLAS, Working Papers. 0127, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: It has been argued that a factor behind the decline in income inequality in Latin America in the 2000s was the educational upgrading of its labor force. Between 1990 and 2010, the proportion of the labor force in the region with at least secondary education increased from 40 to 60 percent. Concurrently, returns to secondary education completion fell throughout the past two decades, while the 2000s saw a reversal in the increase in the returns to tertiary education experienced in the 1990s. This paper studies the evolution of wage differentials and the trends in the supply of workers by educational level for 16 Latin American countries between 1990 and 2000. The analysis estimates the relative contribution of supply and demand factors behind recent trends in skill premia for tertiary and secondary educated workers. Supplyside factors seem to have limited explanatory power relative to demandside factors, and are only relevant to explain part of the fall in wage premia for highschool
    graduates. Although there is significant heterogeneity in individual country experiences, on average the trend reversal in labor demand in the 2000s can be partially attributed to the recent boom in commodity prices that could favor the unskilled (nontertiary educated) workforce, although employment patterns by sector suggest that other withinsector forces are also at play, such as technological diffusion or skill mismatches that may reduce the labor productivity of highlyeducated workers.
  status: '2012'
- title: 'Biased Perceptions of Income Distribution and Preferences for Redistribution: Evidence from a Survey Experiment'
  url: https://ideas.repec.org/p/dls/wpaper/0138.html
  description: Guillermo Cruces & Ricardo Pérez Truglia & Martín Tetaz. CEDLAS, Working Papers. 0138, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: Individual perceptions of income distribution play a vital role in political economy and public finance models, yet there is little evidence regarding their origins or accuracy. This study examines how individuals form these perceptions and explores their potential impact on preferences for redistribution. A tailored household survey provides original evidence on systematic biases in individuals’ evaluations of their own relative position in the income distribution. The study discusses one of the mechanisms that may generate such biases, based on the extrapolation of information from endogenous reference groups, and presents some suggestive evidence that this mechanism has significant explanatory power. The impact of these biased perceptions on attitudes toward redistributive policies is studied by means of an experimental design that was incorporated into the survey, which provided consistent information on the own-ranking within the income distribution to a randomly selected
    group of respondents. The evidence suggests that those who had overestimated their relative position and thought that they were relatively richer than they were tend to demand higher levels of redistribution when informed of their true ranking.
  status: '2012'
- title: 'Inequality in Education: Evidence for Latin America'
  url: https://ideas.repec.org/p/dls/wpaper/0135.html
  description: Guillermo Cruces & Carolina García Domench & Leonardo Gasparini. CEDLAS, Working Papers. 0135, CEDLAS, Universidad Nacional de La Plata.
  linkLabel: Open paper
  abstract: This paper provides original empirical evidence on the evolution of education inequality for all Latin American countries over the decades of 1990 and 2000. The analysis covers a wide range of issues on differences in educational outcomes and opportunities across the population, including inequality in years of education, gaps in school enrollment, wage skill differentials and public social expenditure. The evidence indicates a significant difference between the 1990s and the 2000s in terms of both the assessment of the equity of the education expansion and its impact on the income distribution. In particular, the changes in the 2000s seem to have had a full equalizing impact on earnings given the more pro-poor pattern of the education upgrading and a more stable or even increasing relative demand for low skill labor.
  status: '2012'
